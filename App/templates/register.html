<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <!-- Responsive -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register</title>

  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="auth-page">
  <div class="container" role="main" aria-labelledby="registerTitle">

    <!-- Same brand header as login -->
    <div class="brand-header">
      <img
        src="{{ url_for('static', filename='user_logo.png') }}"
        class="brand-logo"
        alt="TrueCovAI logo">
      <h1 class="brand-name">TrueCovAI</h1>
      <p class="brand-tagline">
        Covid-19 Fake News Detection and Misinformation Analyzer
      </p>
    </div>

    <h2 id="registerTitle" class="form-title">User Registration</h2>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <ul class="flash-list">
          {% for message in messages %}
            <li>{{ message }}</li>
          {% endfor %}
        </ul>
      {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('auth.register') }}" onsubmit="return validateConfirmPassword();">
      <input type="text" name="username" placeholder="Username" required autocomplete="username">
      <input type="email" name="email" placeholder="Email" required autocomplete="email">

      <!-- Password -->
      <div class="password-container">
        <input
          type="password"
          name="password"
          id="reg_password"
          placeholder="Password"
          required
          autocomplete="new-password"
          pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&#])[A-Za-z\d@$!%*?&#]{8,20}$"
          title="Password must be 8–20 characters and include at least one uppercase letter, one lowercase letter, one number, and one special character.">
        <span class="toggle-password" title="Show/Hide Password" onclick="togglePassword('reg_password', this)">
          <i class="fas fa-eye"></i>
        </span>
      </div>

      <!-- Confirm Password -->
      <div class="password-container">
        <input
          type="password"
          name="confirm_password"
          id="reg_confirm_password"
          placeholder="Confirm Password"
          required
          autocomplete="new-password">
        <span class="toggle-password" title="Show/Hide Password" onclick="togglePassword('reg_confirm_password', this)">
          <i class="fas fa-eye"></i>
        </span>
      </div>

      <button type="submit">Register</button>
    </form>

    <p class="auth-alt">
      Already have an account?
      <a href="{{ url_for('auth.login') }}">Login here</a>.
    </p>
  </div>

  <script>
    function togglePassword(id, el) {
      const input = document.getElementById(id);
      const icon  = el.querySelector('i');
      const show  = input.type === "password";
      input.type = show ? "text" : "password";
      icon.classList.toggle('fa-eye', !show);
      icon.classList.toggle('fa-eye-slash', show);
    }

    function validateConfirmPassword() {
      const pass = document.getElementById("reg_password").value;
      const confirm = document.getElementById("reg_confirm_password").value;
      if (pass !== confirm) {
        alert("Passwords do not match.");
        return false;
      }
      return true;
    }
  </script>
</body>
</html>
